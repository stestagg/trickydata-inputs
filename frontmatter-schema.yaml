# JSON Schema for the YAML frontmatter of trickydata input files.
#
# Each input file begins with a YAML frontmatter document: everything before
# the first '\n---\n' is parsed as this frontmatter, and everything after it is
# the input data (or, for some formats, the input lives in a separate file).
# See README.md for the full description of the file structure.
$schema: "https://json-schema.org/draft/2020-12/schema"
title: trickydata input frontmatter
type: object
additionalProperties: true
required:
  - name
  - description
  - tags
  - format
properties:
  name:
    type: string
    description: >-
      Lowercase, underscore-separated, descriptive but concise name of the
      input.
    pattern: "^[a-z0-9]+(_[a-z0-9]+)*$"

  description:
    type: string
    description: >-
      Why this input is included in the corpus and what it is testing for. Must
      justify why the input has been included (e.g. which corner-case it may
      trigger), including hyperlinks to external references where relevant. May
      be multiline.
    minLength: 1

  tags:
    type: array
    description: >-
      Array of tag ids as queried by the indexer. Tags (not the directory
      layout) are used for indexing and querying inputs.
    items:
      type: string
    uniqueItems: true

  format:
    type: string
    description: >-
      The format of the input data. Determines how the data after the
      frontmatter is decoded, or whether it is stored in a separate file. Pick
      the format carefully so the raw data is encoded correctly and is easy to
      debug.
    enum:
      - utf8
      - utf8-strip
      - hex
      - file

  decode-as:
    type: string
    description: >-
      The logical type the decoded input data should be interpreted as. Covers
      fixed-size Rust-style numeric types as well as string/byte encodings.
      Multi-byte types carry an explicit byte-order suffix (`-le`); the corpus
      currently only stores little-endian encodings.
      Required unless a mime-type is given, in which case it is optional and
      defaults to `bytes`. When a mime-type is given, decode-as may only be
      one of the string/byte types (bytes, ascii, utf8, utf16-le, utf32-le,
      latin1).
    default: bytes
    enum:
      # Unsigned integers
      - u8
      - u16-le
      - u32-le
      - u64-le
      - u128-le
      # Signed integers
      - i8
      - i16-le
      - i32-le
      - i64-le
      - i128-le
      # Floating point
      - f16-le
      - f32-le
      - f64-le
      # Boolean
      - bool
      # String / byte types
      - bytes
      - ascii
      - utf8
      - utf16-le
      - utf32-le
      - latin1

  invalid-as:
    type: string
    description: >-
      The logical type this input would decode as if it were valid. The input is
      a deliberately-invalid instance of that type (e.g. an almost-but-not-quite
      valid utf8 sequence) and is therefore stored as `decode-as: bytes`. Clients
      can opt to surface these adversarial cases in the target type's namespace.
      May be any decode-as value except `bytes` (bytes are always valid, so there
      is nothing to be invalid as).
    enum:
      # Unsigned integers
      - u8
      - u16-le
      - u32-le
      - u64-le
      - u128-le
      # Signed integers
      - i8
      - i16-le
      - i32-le
      - i64-le
      - i128-le
      # Floating point
      - f16-le
      - f32-le
      - f64-le
      # Boolean
      - bool
      # String / byte types (bytes excluded)
      - ascii
      - utf8
      - utf16-le
      - utf32-le
      - latin1

  file-source:
    type: string
    description: >-
      Path to a separate file holding the input data, relative to the input
      file. Used when the data is not included inline after the frontmatter
      (e.g. binary inputs with `format: file`). When a file-source is given, any
      non-whitespace content after the frontmatter is treated as an error.

  licence:
    type: string
    description: >-
      SPDX licence identifier for this input. Defaults to MIT; set this to allow
      inputs under other open (but non-MIT) licences where required.
    default: MIT

  mime-type:
    type: string
    description: >-
      Optional MIME type describing how the decoded input should be interpreted
      (e.g. `application/json`, `image/png`). May only be set when decode-as is
      unset or one of the string/byte types; when set, decode-as becomes
      optional and defaults to `bytes`.

  pair:
    type: array
    description: >-
      Other inputs that are meaningful to use alongside this one (e.g. a key and
      a matching payload). Each entry links to another input and records why the
      pairing is interesting.
    items:
      type: object
      additionalProperties: false
      required:
        - with
        - hint
      properties:
        with:
          type: string
          description: >-
            Relative path, from this input file, to the other input in the pair.
          minLength: 1
        hint:
          type: string
          description: >-
            How the two inputs relate. `equal`: they look different but should
            compare equal. `not-equal`: they look the same but should compare
            unequal. `tricky`: together they form a tricky case.
          enum:
            - equal
            - not-equal
            - tricky
    uniqueItems: true

  unicode-meta:
    type: object
    description: >-
      Counts of the Unicode segmentation units in the decoded text. Required
      when decode-as is a Unicode encoding (utf8, utf16-le, utf32-le) so
      downstream clients can validate their own segmentation against known-good
      totals.
    additionalProperties: false
    required:
      - code-units
      - code-points
      - scalar-values
      - legacy-grapheme-clusters
      - extended-grapheme-clusters
    properties:
      code-units:
        type: integer
        minimum: 0
        description: >-
          Number of encoding code units (e.g. bytes for utf8, 16-bit units for
          utf16, 32-bit units for utf32).
      code-points:
        type: integer
        minimum: 0
        description: Number of Unicode code points.
      scalar-values:
        type: integer
        minimum: 0
        description: >-
          Number of Unicode scalar values (code points excluding surrogates).
      legacy-grapheme-clusters:
        type: integer
        minimum: 0
        description: Number of legacy grapheme clusters (UAX #29).
      extended-grapheme-clusters:
        type: integer
        minimum: 0
        description: Number of extended grapheme clusters (UAX #29).

allOf:
  # file-source is always optional, but only allowed when the format is `file`.
  - if:
      not:
        properties:
          format:
            const: file
        required:
          - format
    then:
      not:
        required:
          - file-source

  # decode-as is required unless a mime-type is given.
  - if:
      not:
        required:
          - mime-type
    then:
      required:
        - decode-as

  # mime-type is only populatable when decode-as is unset or a string/byte type.
  - if:
      required:
        - mime-type
    then:
      properties:
        decode-as:
          enum:
            - bytes
            - ascii
            - utf8
            - utf16-le
            - utf32-le
            - latin1

  # invalid-as marks a deliberately-invalid instance of another type, so the
  # input itself must be stored as raw bytes. decode-as may be omitted (it
  # defaults to `bytes`); when present it must be `bytes`.
  - if:
      required:
        - invalid-as
    then:
      properties:
        decode-as:
          const: bytes

  # unicode-meta is required when decode-as is a Unicode encoding.
  - if:
      properties:
        decode-as:
          enum:
            - utf8
            - utf16-le
            - utf32-le
      required:
        - decode-as
    then:
      required:
        - unicode-meta
