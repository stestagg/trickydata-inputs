name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler

      - name: Verify committed corpus is up to date
        run: cargo run --locked --manifest-path compiler/Cargo.toml --bin compare -- ./trickydata

      - name: Compile corpus
        run: cargo run --locked --manifest-path compiler/Cargo.toml --bin compile -- --version "$VERSION" dist

      - uses: astral-sh/setup-uv@v8

      - name: Render report
        run: uv run report/main.py --index dist/trickydata-index.json --out report-site

      - name: Zip report
        run: (cd report-site && zip -r "../trickydata-report-$VERSION.zip" .)

      - name: Render Pages report
        run: uv run report/main.py --index dist/trickydata-index.json --out report-site-pages --versions-url ../index.html

      - name: Check for existing Pages branch
        id: pages-branch
        run: |
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out existing Pages content
        if: steps.pages-branch.outputs.exists == 'true'
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages-existing

      - name: Stage Pages content
        run: |
          mkdir -p pages-site
          if [ -d pages-existing ]; then
            rsync -a --exclude .git pages-existing/ pages-site/
          fi
          rm -rf "pages-site/$GITHUB_REF_NAME"
          mkdir -p "pages-site/$GITHUB_REF_NAME"
          cp -R report-site-pages/. "pages-site/$GITHUB_REF_NAME/"
          python scripts/build-pages-index.py pages-site --latest "$GITHUB_REF_NAME"

      - name: Publish report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: pages-site
          commit_message: Publish report for ${{ github.ref_name }}

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/trickydata.trickydata
            dist/trickydata.zip
            dist/trickydata-index.json
            dist/trickydata.bin
            trickydata-report-${{ env.VERSION }}.zip
