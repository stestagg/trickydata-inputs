name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler

      - name: Run compiler tests
        run: cargo test --locked --manifest-path compiler/Cargo.toml

      - name: Verify committed corpus is up to date
        run: cargo run --locked --manifest-path compiler/Cargo.toml --bin compare -- ./trickydata

      - name: Compile corpus
        run: cargo run --locked --manifest-path compiler/Cargo.toml --bin compile -- dist

      - uses: astral-sh/setup-uv@v8

      - name: Smoke-render report
        run: uv run report/main.py --index dist/trickydata-index.json --out report-site
